# nameOverride: ""
# fullnameOverride: ""

image: public.ecr.aws/jtekt-corporation/image-storage-service:v1.16.17
imagePullPolicy: IfNotPresent

# imagePullSecrets:
#   - name: ecr-pullsecret

api:
  replicaCount: 1
  # resources:
  #   requests:
  #     cpu: 100m
  #     memory: 128Mi
  #   limits:
  #     cpu: 500m
  #     memory: 512Mi

gui:
  image: public.ecr.aws/jtekt-corporation/image-storage-service-gui:v1.9.4
  replicaCount: 1
  # resources:
  #   requests:
  #     cpu: 50m
  #     memory: 64Mi
  #   limits:
  #     cpu: 200m
  #     memory: 128Mi

persistence:
  size: 20Gi

mongodb:
  # connectionString: mongodb://localhost:27017/image_storage
  enabled: true
  image:
    repository: bitnamilegacy/mongodb
  arbiter:
    enabled: false
  livenessProbe:
    enabled: false
  readinessProbe:
    enabled: false
  persistence:
    size: 10Gi
  auth:
    enabled: false
    rootPassword: banana

auth:
  enabled: false
  mongodb:
    enabled: false

kong:
  admin:
    enabled: false # Do not create a service for the admin API
  manager:
    enabled: false # Do not create a service for Kong Manager
  ingressController:
    enabled: false
  env:
    database: "off"
    dns_order: A,CNAME,LAST,SRV
  dblessConfig:
    # Must match the ConfigMap name created by templates/proxy/kong-cm.yml.
    # Override this value if deploying multiple releases to the same namespace.
    configMap: kong-config
  proxy:
    type: NodePort
    http:
      nodePort: 30107
    tls:
      enabled: false
