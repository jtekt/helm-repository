# Default values for ecr-pullsecret-renewer.

# Cron schedule for the ECR pull secret renewal job.
schedule: "0 * * * *"

image:
  repository: public.ecr.aws/jtekt-corporation/ecr-pullsecret-renewer
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created.
  create: true
  # Automatically mount a ServiceAccount's API credentials.
  automount: true
  # Annotations to add to the service account.
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# AWS credentials and ECR configuration required by the renewer.
# These can be supplied directly via env or by referencing a Secret via envFrom.
#
# Required variables:
#   AWS_ACCESS_KEY_ID     - AWS access key
#   AWS_SECRET_ACCESS_KEY - AWS secret key
#   AWS_DEFAULT_REGION    - AWS region where the ECR registry is hosted
#   AWS_ECR_URL           - ECR registry URL (e.g. 123456789.dkr.ecr.eu-west-1.amazonaws.com)

# Environment variables injected directly into the container.
env: []
  # - name: AWS_DEFAULT_REGION
  #   value: eu-west-1
  # - name: AWS_ECR_URL
  #   value: 123456789.dkr.ecr.eu-west-1.amazonaws.com

# Sources to populate environment variables from (ConfigMaps or Secrets).
# Useful for supplying AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY from a Secret.
envFrom: []
  # - secretRef:
  #     name: ecr-pullsecret-renewer-credentials

resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}
