{{- $fullName := printf "%s-proxy" (include "shinsei-manager.prefix" .) | trunc 63 | trimSuffix "-" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "shinsei-manager.labels" . | nindent 4 }}
    app: {{ $fullName }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $fullName }}
  template:
    metadata:
      labels:
        app: {{ $fullName }}
    spec:
      containers:
      - name: {{ $fullName }}
        image: {{ .Values.images.shinseiManager.proxy }}
        ports:
        - containerPort: 80
        envFrom:
        - secretRef:
            name: {{ include "shinsei-manager.prefix" . }}-env
        env:
        - name: PROXY_ROOT
          value: http://{{ printf "%s-front" (include "shinsei-manager.prefix" .) | trunc 63 | trimSuffix "-" }}
        - name: IDENTIFICATION_URL
          value: ""
        {{- with .Values.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
