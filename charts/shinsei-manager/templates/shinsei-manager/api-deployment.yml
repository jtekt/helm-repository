{{- $fullName := include "shinsei-manager.prefix" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "shinsei-manager.labels" . | nindent 4 }}
    app: {{ $fullName }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $fullName }}
  template:
    metadata:
      labels:
        app: {{ $fullName }}
    spec:
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ $fullName }}
      containers:
      - name: {{ $fullName }}
        image: {{ .Values.images.shinseiManager.api }}
        ports:
        - containerPort: 80
        envFrom:
        - secretRef:
            name: {{ $fullName }}-env
        volumeMounts:
        - mountPath: "/usr/share/pv"
          name: data
        {{- with .Values.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
